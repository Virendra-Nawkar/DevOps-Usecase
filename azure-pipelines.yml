# azure-pipelines.yml
# Triggers automatically when code is pushed to main or dev

trigger:
  branches:
    include:
      - main
      - dev

variables:
  # Your ACR login server URL
  acrLoginServer: 'virendraacr1.azurecr.io'
  # Image name inside ACR
  imageName: 'reactapp'
  # Unique tag per build using pipeline run number
  imageTag: '$(Build.BuildId)'
  # Your Azure Web App name
  webAppName: 'virendra-react-app'

stages:

# ─────────────────────────────────
# STAGE 1 — CI: Build & Push to ACR
# ─────────────────────────────────
- stage: CI
  displayName: 'Build and Push to ACR'
  jobs:
  - job: BuildAndPush
    displayName: 'Build Docker image and push to ACR'
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # Step 1: Checkout code from Azure Repos
    # This downloads your code onto the pipeline agent machine
    - checkout: self

    # Step 2: Login to ACR using the service connection we created
    # "acr-service-connection" is the name we gave in Project Settings
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: 'acr-service-connection'

    # Step 3: Build Docker image
    # Tags it with both the build number AND latest
    # Build number example: if this is run 42, image gets tag "42" and "latest"
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: 'build'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: |
          $(imageTag)
          latest
        Dockerfile: 'Dockerfile'

    # Step 4: Push image to ACR
    # Pushes both tags — "42" and "latest"
    - task: Docker@2
      displayName: 'Push image to ACR'
      inputs:
        command: 'push'
        repository: '$(acrLoginServer)/$(imageName)'
        tags: |
          $(imageTag)
          latest

# ─────────────────────────────────
# STAGE 2 — CD: Deploy to Web App
# ─────────────────────────────────
- stage: CD
  displayName: 'Deploy to Azure Web App'
  # Only runs after CI stage succeeds
  dependsOn: CI
  # Only deploys when pushing to main — not dev
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployToWebApp
    displayName: 'Deploy container to Web App'
    pool:
      vmImage: 'ubuntu-latest'
    # "production" is a named environment — tracks deployment history
    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          # Deploy the image to Azure Web App
          # This tells Web App: pull this exact image from ACR and run it
          - task: AzureWebAppContainer@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: 'azure-service-connection'
              appName: '$(webAppName)'
              imageName: '$(acrLoginServer)/$(imageName):$(imageTag)'
