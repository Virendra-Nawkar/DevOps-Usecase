# azure-pipelines.yml
# Triggers automatically when code is pushed to main or dev

trigger:
  branches:
    include:
      - main
      - dev

variables:
  # Your ACR login server URL
  acrLoginServer: 'virendraacr1.azurecr.io'
  # Image name inside ACR — just the name, NO URL prefix
  imageName: 'reactapp'
  # Unique tag per build using pipeline run number
  imageTag: '$(Build.BuildId)'
  # Your Azure Web App name
  webAppName: 'virendra-react-app'

stages:

# ─────────────────────────────────
# STAGE 1 — CI: Build & Push to ACR
# ─────────────────────────────────
- stage: CI
  displayName: 'Build and Push to ACR'
  jobs:
  - job: BuildAndPush
    displayName: 'Build Docker image and push to ACR'
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # Step 1: Checkout code from Azure Repos
    - checkout: self

    # Step 2: Login to ACR using the service connection
    - task: Docker@2
      displayName: 'Login to ACR'
      inputs:
        command: 'login'
        containerRegistry: 'acr-service-connection'

    # Step 3: Build Docker image
    # repository is ONLY the image name — service connection adds ACR URL automatically
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: 'build'
        repository: '$(imageName)'
        containerRegistry: 'acr-service-connection'
        tags: |
          $(imageTag)
          latest
        Dockerfile: 'Dockerfile'

    # Step 4: Push image to ACR
    - task: Docker@2
      displayName: 'Push image to ACR'
      inputs:
        command: 'push'
        repository: '$(imageName)'
        containerRegistry: 'acr-service-connection'
        tags: |
          $(imageTag)
          latest

# ─────────────────────────────────
# STAGE 2 — CD: Deploy to Web App
# ─────────────────────────────────
- stage: CD
  displayName: 'Deploy to Azure Web App'
  dependsOn: CI
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployToWebApp
    displayName: 'Deploy container to Web App'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          - task: AzureWebAppContainer@1
            displayName: 'Deploy to Azure Web App'
            inputs:
              azureSubscription: 'azure-service-connection'
              appName: '$(webAppName)'
              imageName: '$(acrLoginServer)/$(imageName):$(imageTag)'
